<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal recording of a real run: scripts/smoke.sh output and one
       tool_call event from the resulting audit.jsonl (sha256 truncated). -->
  <rect width="1100" height="760" rx="12" fill="#0d1117"/>
  <rect width="1100" height="36" rx="12" fill="#161b22"/>
  <rect y="24" width="1100" height="12" fill="#161b22"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="18" r="6" fill="#febc2e"/>
  <circle cx="68" cy="18" r="6" fill="#28c840"/>
  <text x="550" y="23" text-anchor="middle" fill="#8b949e" font-size="13">mcp-audit — MCP protocol round-trip + audit trail</text>

  <g fill="#c9d1d9">
    <text x="28" y="70"><tspan fill="#7ee787">$</tspan> bash scripts/smoke.sh</text>
    <text x="28" y="98"><tspan fill="#8b949e">[smoke]</tspan> === MCP protocol round-trip against the audited stdio server ===</text>
    <text x="28" y="122"><tspan fill="#8b949e">[smoke]</tspan> initialize -&gt; serverInfo=audited-demo@0.1.0 protocol=2025-06-18</text>
    <text x="28" y="146"><tspan fill="#8b949e">[smoke]</tspan> tools/list -&gt; [add, echo]</text>
    <text x="28" y="170"><tspan fill="#8b949e">[smoke]</tspan> tools/call echo -&gt; "hello smoke"</text>
    <text x="28" y="194"><tspan fill="#8b949e">[smoke]</tspan> tools/call unknown tool -&gt; protocol-conformant error, process alive</text>
    <text x="28" y="218"><tspan fill="#8b949e">[smoke]</tspan> audit log: 5 events, all valid against audit-event.schema.json</text>
    <text x="28" y="242"><tspan fill="#8b949e">[smoke]</tspan> audit assertions: session lifecycle, trace propagation, redaction, durations</text>
    <text x="28" y="266"><tspan fill="#7ee787">SMOKE OK</tspan></text>

    <text x="28" y="310"><tspan fill="#7ee787">$</tspan> head -2 audit.jsonl | tail -1 | jq .   <tspan fill="#8b949e"># one tool_call event, ready for Splunk / Datadog / OTel</tspan></text>
    <text x="28" y="338">{</text>
    <text x="28" y="362">  <tspan fill="#79c0ff">"spec_version"</tspan>: <tspan fill="#a5d6ff">"0.1"</tspan>,</text>
    <text x="28" y="386">  <tspan fill="#79c0ff">"event_type"</tspan>: <tspan fill="#a5d6ff">"tool_call"</tspan>,</text>
    <text x="28" y="410">  <tspan fill="#79c0ff">"timestamp"</tspan>: <tspan fill="#a5d6ff">"2026-07-08T05:51:57.589Z"</tspan>,</text>
    <text x="28" y="434">  <tspan fill="#79c0ff">"traceparent"</tspan>: <tspan fill="#a5d6ff">"00-9a9bc359798c5b78bf16ef8fce6328af-d5514a282617ab7a-01"</tspan>,</text>
    <text x="28" y="458">  <tspan fill="#79c0ff">"session_id"</tspan>: <tspan fill="#a5d6ff">"6ad7ef08-31bf-4d48-9240-fedff8508848"</tspan>,</text>
    <text x="28" y="482">  <tspan fill="#79c0ff">"server"</tspan>: { <tspan fill="#79c0ff">"name"</tspan>: <tspan fill="#a5d6ff">"quickstart"</tspan>, <tspan fill="#79c0ff">"version"</tspan>: <tspan fill="#a5d6ff">"0.1.0"</tspan> },</text>
    <text x="28" y="506">  <tspan fill="#79c0ff">"tool"</tspan>: {</text>
    <text x="28" y="530">    <tspan fill="#79c0ff">"name"</tspan>: <tspan fill="#a5d6ff">"lookup_order"</tspan>,</text>
    <text x="28" y="554">    <tspan fill="#79c0ff">"arguments"</tspan>: { <tspan fill="#79c0ff">"order_id"</tspan>: <tspan fill="#a5d6ff">"42"</tspan>, <tspan fill="#79c0ff">"api_key"</tspan>: <tspan fill="#ff7b72">"[REDACTED]"</tspan> },</text>
    <text x="28" y="578">    <tspan fill="#79c0ff">"arguments_digest"</tspan>: { <tspan fill="#79c0ff">"sha256"</tspan>: <tspan fill="#a5d6ff">"9edc1256..."</tspan>, <tspan fill="#79c0ff">"byte_length"</tspan>: <tspan fill="#d2a8ff">57</tspan>, <tspan fill="#79c0ff">"redacted_keys"</tspan>: [<tspan fill="#a5d6ff">"api_key"</tspan>] }</text>
    <text x="28" y="602">  },</text>
    <text x="28" y="626">  <tspan fill="#79c0ff">"outcome"</tspan>: { <tspan fill="#79c0ff">"status"</tspan>: <tspan fill="#a5d6ff">"success"</tspan> },</text>
    <text x="28" y="650">  <tspan fill="#79c0ff">"duration_ms"</tspan>: <tspan fill="#d2a8ff">0.325</tspan></text>
    <text x="28" y="674">}</text>
    <text x="28" y="718"><tspan fill="#8b949e"># every tool call your agent makes -> one schema-validated audit event in your SIEM</tspan></text>
  </g>
</svg>
